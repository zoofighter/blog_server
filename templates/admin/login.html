{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-20">
    <h1 class="text-2xl font-bold text-center mb-8">Admin Login</h1>

    {% if error %}
    <div class="bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login" class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-200 dark:border-gray-700">
        <label class="block text-sm font-medium mb-2">비밀번호</label>
        <input type="password" name="password" required autofocus
               class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
        <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">로그인</button>
    </form>
</div>
{% endblock %}
